name: Publish to Zenodo

# Triggers when a GitHub Release is published. The author retains control over
# WHEN a release happens (via `gh release create`); this workflow just handles
# the Zenodo-side publish so the PDF lands as a top-level file alongside the
# source archive.
#
# Setup (one-time):
#   1. Disable the Zenodo-GitHub integration for this repo:
#        https://zenodo.org/account/settings/github/repository/CIRWEL/unitares-paper-v6
#      Otherwise the integration will create a competing record on each release.
#   2. Generate a Zenodo API token with scopes deposit:write + deposit:actions:
#        https://zenodo.org/account/settings/applications/tokens/new/
#   3. Add it as a repo secret named ZENODO_TOKEN:
#        gh secret set ZENODO_TOKEN -R CIRWEL/unitares-paper-v6
#
# After that, the normal release ritual (see scripts/sync-paper-version.sh)
# continues to work — `gh release create paper-vX.Y` triggers this workflow.

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to append Zenodo DOI to release notes

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Verify required files
        run: |
          test -f unitares-v6.pdf || { echo "::error::unitares-v6.pdf not found at tag"; exit 1; }
          test -f .zenodo.json || { echo "::error::.zenodo.json not found"; exit 1; }
          test -f scripts/publish-to-zenodo.sh || { echo "::error::scripts/publish-to-zenodo.sh missing"; exit 1; }

      - name: Build source archive (matches GitHub default layout)
        id: archive
        run: |
          tag="${{ github.event.release.tag_name }}"
          repo_slug="${{ github.event.repository.full_name }}"
          repo_dashed="${repo_slug//\//-}"
          short_sha="$(git rev-parse --short=7 HEAD)"
          stage_dir="${repo_dashed}-${short_sha}"
          out_zip="${repo_dashed}-${tag}.zip"

          mkdir -p "/tmp/staging/${stage_dir}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.worktrees' \
            --exclude='.gitignore' \
            ./ "/tmp/staging/${stage_dir}/"

          (cd /tmp/staging && zip -qr "${out_zip}" "${stage_dir}")
          mv "/tmp/staging/${out_zip}" "./${out_zip}"
          echo "zip_path=${out_zip}" >>"$GITHUB_OUTPUT"

      - name: Publish to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          chmod +x scripts/publish-to-zenodo.sh
          ./scripts/publish-to-zenodo.sh \
            "${{ github.event.release.tag_name }}" \
            "unitares-v6.pdf" \
            "${{ steps.archive.outputs.zip_path }}" \
            | tee zenodo-publish.log

      - name: Append Zenodo DOI to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          doi_url="$(grep -oE 'https://doi.org/10\.5281/zenodo\.[0-9]+' zenodo-publish.log | head -n1 || true)"
          if [[ -z "$doi_url" ]]; then
            echo "::warning::could not extract DOI from publish output; skipping release-notes update"
            exit 0
          fi
          tag="${{ github.event.release.tag_name }}"
          current_body="$(gh release view "$tag" --json body --jq .body)"
          if printf '%s' "$current_body" | grep -q "$doi_url"; then
            echo "release notes already mention $doi_url"
            exit 0
          fi
          appended="$(printf '%s\n\n---\nZenodo: %s\n' "$current_body" "$doi_url")"
          gh release edit "$tag" --notes "$appended"
